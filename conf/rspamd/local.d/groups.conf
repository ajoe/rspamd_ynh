## /etc/rspamd/local.d/groups.conf
## Score adjustments — applied on top of stock symbols.
## Updated 2026-04-25.

symbols = {
  "R_SPF_FAIL"      { score = 4.0; }
  "DKIM_REJECT"     { score = 3.0; }
  "DMARC_REJECT"    { score = 4.0; }

  # New: missing alignment / no auth at all
  "R_SPF_NEUTRAL"   { score = 1.5; }
  "R_SPF_SOFTFAIL"  { score = 1.5; }
  "R_DKIM_NA"       { score = 1.0; }
  "DMARC_NA"        { score = 1.5; }

  # MIME structure issues
  "MIME_MA_MISSING_HTML"  { score = 1.5; }   # default 1.0
  "FROM_NEQ_ENVFROM"      { score = 1.0; }   # default 0
  "ONCE_RECEIVED"         { score = 0.5; }   # default 0.2

  # Spamhaus / RBL — give them real weight once enabled
  "RBL_SPAMHAUS"          { score = 6.0; }
  "RBL_SPAMHAUS_DBL"      { score = 6.0; }
  "RBL_SPAMHAUS_XBL"      { score = 4.0; }
  "RBL_SPAMHAUS_PBL"      { score = 2.0; }
  "URIBL_DBL_SPAM"        { score = 6.5; }
  "URIBL_DBL_PHISH"       { score = 6.5; }
  "RBL_SPAMCOP"           { score = 3.0; }
  "RBL_SORBS_SPAM"        { score = 3.0; }
}
