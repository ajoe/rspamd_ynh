## /etc/rspamd/local.d/multimap.conf
## Custom multimap rules for sender domain / TLD reputation.
## NOTE: this server forwards mail via SRS, so envelope-from is rewritten
## to fluid8.de. We therefore match against the MIME From: header to see
## the *claimed* original sender.

# Score senders that come from notoriously abused TLDs (.click, .top, .xyz, ...)
SUSPICIOUS_FROM_TLD {
    type = "header";
    header = "From";
    filter = "email:domain:tld";
    map = "${LOCAL_CONFDIR}/local.d/maps.d/suspicious_from_tlds.map";
    score = 4.0;
    description = "From: header domain uses a suspicious/abused TLD";
}

# Hard blocklist for confirmed bad sender domains (FQDN)
BLOCKED_SENDER_DOMAIN {
    type = "header";
    header = "From";
    filter = "email:domain";
    map = "${LOCAL_CONFDIR}/local.d/maps.d/blocked_sender_domains.map";
    score = 8.0;
    description = "From: domain on local blocklist";
}

# Same blocklist also applied to SMTP envelope from (catches non-SRS paths)
BLOCKED_ENVFROM_DOMAIN {
    type = "from";
    filter = "email:domain";
    map = "${LOCAL_CONFDIR}/local.d/maps.d/blocked_sender_domains.map";
    score = 8.0;
    description = "Envelope From domain on local blocklist";
}

# Hard blocklist for HELO / sending hostnames
BLOCKED_HELO_HOSTNAME {
    type = "helo";
    map = "${LOCAL_CONFDIR}/local.d/maps.d/blocked_helo.map";
    score = 6.0;
    description = "HELO hostname on local blocklist";
}

# Catch known-bad sending IPs / nets — matches the connecting client IP
# (the IP rspamd receives via the milter / proxy interface).
BLOCKED_CLIENT_IP {
    type = "ip";
    map = "${LOCAL_CONFDIR}/local.d/maps.d/blocked_ips.map";
    score = 5.0;
    description = "Connecting client IP on local blocklist";
}
